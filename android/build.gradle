buildscript {
  ext.KustomMobileSDKRN = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return KustomMobileSDKRN[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
    classpath "org.jetbrains.kotlin:kotlin-serialization:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "org.jetbrains.kotlin.plugin.serialization"

apply plugin: "com.facebook.react"

android {
  namespace "com.kustom.mobile.sdk.reactnative"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      // TODO: restore old-arch/new-arch split once old arch decision is made.
      // For now always include newarch — RN 0.83 always runs new arch.
      java.srcDirs += ["src/newarch/java"]
    }
  }
}

repositories {
  mavenLocal()
  // TODO: verify whether explicit Klarna SDK dep is needed or if kustom-mobile-sdk pulls it transitively.
  // See PLAN.md — Open Questions.
  maven {
    url 'https://x.klarnacdn.net/mobile-sdk/'
  }
  maven {
    url 'https://x.kustomcdn.co/mobile-sdk/android/'
    content {
      includeGroup "com.kustom.mobile.sdk"
    }
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation 'com.kustom.mobile.sdk:kustom-mobile-sdk:1.0.1'
  implementation "org.jetbrains.kotlin:kotlin-reflect:${getExtOrDefault('kotlinVersion')}"
  implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.8.0'
  // TODO: check if com.klarna.mobile:sdk needs explicit dep or comes transitively via kustom-mobile-sdk.
  // See PLAN.md — Open Questions.
}
